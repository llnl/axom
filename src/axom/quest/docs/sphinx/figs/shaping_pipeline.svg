<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='900' viewBox='0 0 1600 900' role='img' aria-labelledby='title desc'><title id='title'>Quest shaping pipeline</title><desc id='desc'>Diagram showing Klee shape input flowing through Quest shaper setup, a per-shape processing loop, and output material volume fraction fields on the target mesh.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f7f9fb" />
    <stop offset="100%" stop-color="#eef3f7" />
  </linearGradient>
  <linearGradient id="meshGlow" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#dbe8f4" stop-opacity="0.85" />
    <stop offset="100%" stop-color="#f7fafc" stop-opacity="0.35" />
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#2d3742" flood-opacity="0.12" />
  </filter>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 z" fill="#48667d" />
  </marker>
</defs>
<style>
  .bg { fill: url(#bg); }
  .halo-a { fill: #d9e7f3; opacity: 0.55; }
  .halo-b { fill: #e4e8ec; opacity: 0.72; }
  .panel { filter: url(#shadow); stroke-width: 2.5; }
  .input { fill: #f4f7fa; stroke: #5f7385; }
  .setup { fill: #e9f2f9; stroke: #2980b9; }
  .output { fill: #eef3f7; stroke: #607d94; }
  .step { fill: #ffffff; stroke: #70818f; stroke-width: 2; }
  .loop-frame { fill: none; stroke: #6b8193; stroke-width: 3; stroke-dasharray: 12 12; }
  .connector { stroke: #48667d; stroke-width: 3; stroke-linecap: round; }
  .connector-soft { stroke: #7a90a3; stroke-width: 2.5; stroke-linecap: round; stroke-dasharray: 8 8; }
  .stage-title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #343131; }
  .loop-title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #3b4d5d; }
  .step-title { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #344654; }
  .step-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 15px; fill: #556977; }
  .body-text { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; fill: #445867; }
  .small-label { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; fill: #627583; }
  .caption { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 20px; fill: #586874; }
  .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace; font-size: 20px; fill: #344654; }
  .bullet-dot { fill: #2980b9; }
</style>
<rect class='bg' x='0' y='0' width='1600' height='900' /><circle class='halo-a' cx='1280' cy='150' r='180' /><circle class='halo-b' cx='240' cy='760' r='170' /><text class='stage-title' x='72' y='88'><tspan x='72' dy='0'>Quest shaping pipeline</tspan></text><text class='caption' x='74' y='130'><tspan x='74' dy='0'>Klee describes shapes. Quest loads them, queries the target mesh,</tspan><tspan x='74' dy='28'>and writes material volume fractions.</tspan></text><text class='small-label' x='100' y='214'><tspan x='100' dy='0'>Klee input</tspan></text><rect class='panel input' x='72' y='234' width='340' height='250' rx='28' ry='28' /><text class='stage-title' x='100' y='286'><tspan x='100' dy='0'>Shape set</tspan></text><circle class='bullet-dot' cx='104' cy='338' r='4' /><text class='body-text' x='122' y='344'>material name</text><circle class='bullet-dot' cx='104' cy='368' r='4' /><text class='body-text' x='122' y='374'>geometry path and format</text><circle class='bullet-dot' cx='104' cy='398' r='4' /><text class='body-text' x='122' y='404'>transforms</text><circle class='bullet-dot' cx='104' cy='428' r='4' /><text class='body-text' x='122' y='434'>replacement rules</text><text class='small-label' x='490' y='214'><tspan x='490' dy='0'>Quest setup</tspan></text><rect class='panel setup' x='462' y='234' width='340' height='250' rx='28' ry='28' /><text class='stage-title' x='490' y='286'><tspan x='490' dy='0'>Target mesh + shaper</tspan></text><circle class='bullet-dot' cx='494' cy='338' r='4' /><text class='body-text' x='512' y='344'>MFEM or Blueprint mesh</text><circle class='bullet-dot' cx='494' cy='368' r='4' /><text class='body-text' x='512' y='374'>sampling or intersection shaper</text><circle class='bullet-dot' cx='494' cy='398' r='4' /><text class='body-text' x='512' y='404'>runtime policy and tolerances</text><circle class='bullet-dot' cx='494' cy='428' r='4' /><text class='body-text' x='512' y='434'>optional initial vol_frac_*</text><text class='small-label' x='874' y='214'><tspan x='874' dy='0'>Per-shape loop</tspan></text><rect class='loop-frame' x='842' y='218' width='500' height='540' rx='34' ry='34' /><text class='loop-title' x='876' y='278'><tspan x='876' dy='0'>For each shape</tspan></text><rect class='step' x='872' y='326' width='212' height='100' rx='28' ry='28' /><text class='step-title' x='892' y='362'><tspan x='892' dy='0'>loadShape()</tspan></text><text class='step-text' x='892' y='400'><tspan x='892' dy='0'>read geometry</tspan><tspan x='892' dy='22'>and apply transforms</tspan></text><rect class='step' x='1110' y='326' width='212' height='100' rx='28' ry='28' /><text class='step-title' x='1130' y='362'><tspan x='1130' dy='0'>prepare</tspan><tspan x='1130' dy='22'>ShapeQuery()</tspan></text><text class='step-text' x='1130' y='400'><tspan x='1130' dy='0'>build spatial index</tspan><tspan x='1130' dy='22'>or intersection data</tspan></text><rect class='step' x='872' y='494' width='212' height='100' rx='28' ry='28' /><text class='step-title' x='892' y='530'><tspan x='892' dy='0'>runShapeQuery()</tspan></text><text class='step-text' x='892' y='568'><tspan x='892' dy='0'>measure overlap</tspan><tspan x='892' dy='22'>with target zones</tspan></text><rect class='step' x='1110' y='494' width='212' height='100' rx='28' ry='28' /><text class='step-title' x='1130' y='530'><tspan x='1130' dy='0'>applyReplacement</tspan><tspan x='1130' dy='22'>Rules()</tspan></text><text class='step-text' x='1130' y='568'><tspan x='1130' dy='0'>merge with existing</tspan><tspan x='1130' dy='22'>materials</tspan></text><rect class='step' x='992' y='622' width='264' height='100' rx='28' ry='28' /><text class='step-title' x='1012' y='658'><tspan x='1012' dy='0'>finalizeShapeQuery()</tspan></text><text class='step-text' x='1012' y='696'><tspan x='1012' dy='0'>clear temporary state</tspan><tspan x='1012' dy='22'>before the next shape</tspan></text><line class='connector' x1='412' y1='360' x2='462' y2='360' marker-end='url(#arrow)' /><line class='connector' x1='802' y1='360' x2='842' y2='360' marker-end='url(#arrow)' /><line class='connector' x1='1084' y1='376' x2='1110' y2='376' marker-end='url(#arrow)' /><line class='connector' x1='978' y1='426' x2='978' y2='494' marker-end='url(#arrow)' /><line class='connector' x1='1216' y1='426' x2='1216' y2='494' marker-end='url(#arrow)' /><line class='connector' x1='1084' y1='544' x2='1110' y2='544' marker-end='url(#arrow)' /><line class='connector' x1='978' y1='594' x2='1102' y2='622' marker-end='url(#arrow)' /><line class='connector' x1='1216' y1='594' x2='1146' y2='622' marker-end='url(#arrow)' /><line class='connector-soft' x1='1124' y1='722' x2='1124' y2='764' marker-end='url(#arrow)' /><text class='step-text' x='1146' y='758'><tspan x='1146' dy='0'>next shape</tspan></text><text class='small-label' x='1406' y='214'><tspan x='1406' dy='0'>Quest output</tspan></text><rect class='panel output' x='1378' y='234' width='180' height='250' rx='28' ry='28' /><text class='stage-title' x='1406' y='286'><tspan x='1406' dy='0'>Volume</tspan><tspan x='1406' dy='30'>fractions</tspan></text><circle class='bullet-dot' cx='1410' cy='340' r='4' /><text class='body-text' x='1428' y='346'>vol_frac_matA</text><circle class='bullet-dot' cx='1410' cy='370' r='4' /><text class='body-text' x='1428' y='376'>vol_frac_matB</text><circle class='bullet-dot' cx='1410' cy='400' r='4' /><text class='body-text' x='1428' y='406'>vol_frac_free</text><circle class='bullet-dot' cx='1410' cy='430' r='4' /><text class='body-text' x='1428' y='436'>ready for output</text><line class='connector' x1='1342' y1='360' x2='1378' y2='360' marker-end='url(#arrow)' /><rect class='setup' x='1354' y='552' width='240' height='140' rx='24' ry='24' /><text class='step-title' x='1380' y='598'><tspan x='1380' dy='0'>Target mesh state</tspan></text><text class='step-text' x='1380' y='638'><tspan x='1380' dy='0'>materials now encode</tspan><tspan x='1380' dy='26'>shape overlap per zone</tspan></text><line class='connector' x1='1468' y1='484' x2='1468' y2='552' marker-end='url(#arrow)' /><path d='M 632 486 C 612 540, 662 612, 842 612' class='connector-soft' fill='none' /><line class='connector-soft' x1='632' y1='484' x2='632' y2='486' /><text class='step-text' x='500' y='592'><tspan x='500' dy='0'>optional: import existing</tspan><tspan x='500' dy='26'>material fields before shaping</tspan></text></svg>